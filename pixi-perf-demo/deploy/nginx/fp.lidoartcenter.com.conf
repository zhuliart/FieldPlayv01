# FieldPlay 性能验证 DEMO · Nginx 站点配置
# 部署到 fp.lidoartcenter.com（Linux VPS + Nginx 手动部署）
#
# 安装位置：/etc/nginx/sites-available/fp.lidoartcenter.com.conf
# 启用：    ln -s /etc/nginx/sites-available/fp.lidoartcenter.com.conf /etc/nginx/sites-enabled/
# 站点根：  把 `npm run build` 产出的 dist/ 内容放到 root 指向的目录
#
# 这是 HTTP(80) 初版；执行 `certbot --nginx -d fp.lidoartcenter.com` 后，
# certbot 会自动改写本文件：加 443 ssl 服务块 + 80→443 跳转（见文末注释示例）。

server {
    listen 80;
    listen [::]:80;
    server_name fp.lidoartcenter.com;

    # 站点根：dist/ 的内容（与 DOM 基准版 /usr/share/nginx/html/fieldplay 并排，A/B 对比互不覆盖）
    root /usr/share/nginx/html/fieldplay-pixi;
    index index.html;

    # 仅压缩文本（JPG/PNG 已压缩，别再 gzip）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # index.html 不缓存 → 发版即时生效
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Vite 产出的带 hash 的 JS/CSS → 永久强缓存
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 美术资源（命名稳定、未带 hash）→ 7 天缓存；改版后想立刻刷新可调小或加 ?v= 版本号
    location ~* \.(png|jpe?g|webp|gif|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # 单页应用兜底（本 DEMO 无前端路由，保险起见保留）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 隐藏 dotfiles，但放行 ACME 校验
    location ~ /\.(?!well-known) {
        deny all;
    }
}

