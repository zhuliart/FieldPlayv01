<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>FieldPlay · PixiJS 性能验证 DEMO</title>
    <link rel="preconnect" href="https://fonts.font.im" />
    <link
      href="https://fonts.font.im/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1820; /* 夜底 letterbox（设计令牌） */
        font-family: 'Noto Sans SC', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        touch-action: none;
      }
      /* 固定 1280×720 设计舞台，居中 letterbox，由 stage.ts 的 fitBoard 等比缩放 */
      #fp-wrap {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #0b1820;
      }
      #fp-root {
        position: relative;
        flex: none;
        width: 1280px;
        height: 720px;
        transform-origin: center center;
        overflow: hidden;
        /* 天空渐变（设计令牌：舞台底） */
        background: linear-gradient(#5fb6ea 0%, #84c9ef 22%, #b6e0f4 40%, #d8eef6 50%);
      }
      #fp-root canvas {
        position: absolute;
        inset: 0;
        display: block;
      }
      .fp-num {
        font-family: 'Baloo 2', 'Noto Sans SC', sans-serif;
      }
      .fp-logo {
        font-family: 'ZCOOL KuaiLe', sans-serif;
      }
      /* H5 原型动画关键帧（HUD 脉冲 / Toast 上浮 / 机器人摇摆，与 FieldPlay.dc.html 对齐） */
      @keyframes fpGlow { 0%, 100% { opacity: 0.62; } 50% { opacity: 1; } }
      @keyframes fpRise { from { transform: translate(-50%, 8px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
      @keyframes fpRiseR { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes fpBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes fpSway { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
      @keyframes fpTwinkle { 0%, 100% { opacity: 0.78; } 50% { opacity: 1; } }
      @keyframes fpRotateNudge { 0%, 60%, 100% { transform: rotate(0deg); } 30% { transform: rotate(-82deg); } }

      /* 首屏加载提示 */
      #fp-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #eaf6e0;
        font-size: 16px;
        letter-spacing: 2px;
        z-index: 999;
        background: #0b1820;
      }
    </style>
  </head>
  <body>
    <div id="fp-boot">铁娃子果蔬园 · 加载中…</div>
    <div id="fp-wrap">
      <div id="fp-root"></div>
    </div>
    <!-- 竖屏提示（非阻断）：手机竖屏时由 stage.ts fitBoard 显示，旋转到横屏自动消失 -->
    <div
      id="fp-rotate-hint"
      style="
        display: none;
        position: fixed;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        z-index: 9998;
        align-items: center;
        gap: 7px;
        background: rgba(11, 24, 32, 0.86);
        color: #eaf6e0;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        padding: 8px 16px;
        border-radius: 22px;
        border: 1px solid rgba(176, 134, 63, 0.5);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
        pointer-events: none;
        white-space: nowrap;
      "
    >
      <span style="font-size: 18px; animation: fpRotateNudge 1.8s ease-in-out infinite; display: inline-block">🔄</span>
      旋转手机至横屏，体验更佳
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
