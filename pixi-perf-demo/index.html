<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>FieldPlay · PixiJS 性能验证 DEMO</title>
    <link rel="preconnect" href="https://fonts.font.im" />
    <link
      href="https://fonts.font.im/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #141d2b; /* letterbox 兜底底色（与下方画框渐变同调） */
        font-family: 'Noto Sans SC', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        touch-action: none;
      }
      /* 固定 1280×720 设计舞台，居中 letterbox，由 stage.ts 的 fitBoard 等比缩放。
         黑边「美化」：竖向 天空→泥土 暗渐变（呼应场景上天下地）+ 四周渐暗暗角 → 留白像刻意的画框、非空洞。 */
      #fp-wrap {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background:
          radial-gradient(135% 100% at 50% 42%, rgba(40, 58, 86, 0) 0%, rgba(8, 13, 21, 0.5) 76%, rgba(3, 6, 10, 0.85) 100%),
          linear-gradient(#172339 0%, #161f2d 46%, #1d1913 100%);
      }
      /* 黑边「边缘采样补全」：main.ts 取当前场景的 顶/中/底 边缘色铺成竖向渐变铺满整屏。
         舞台(#fp-root)叠其上居中 → 上黑边=场景顶边色、下黑边=场景底边色 → 与画面边缘同色、天衣无缝、
         无模糊接缝、无白边，随昼夜自动变色。比模糊图更干净（尤其细黑边/全屏）。 */
      #fp-backdrop {
        position: absolute;
        inset: 0;
        z-index: 0;
        opacity: 0;
        transition: opacity 0.5s ease, background 0.6s linear;
      }
      #fp-root {
        position: relative;
        flex: none;
        width: 1280px;
        height: 720px;
        z-index: 1; /* 在补全背景之上 */
        transform-origin: center center;
        overflow: hidden;
        /* 天空渐变（设计令牌：舞台底；画布满覆盖、平时不可见） */
        background: linear-gradient(#5fb6ea 0%, #84c9ef 22%, #b6e0f4 40%, #d8eef6 50%);
        /* 无描边、无投影 → 画面与采样背景同色相接，彻底消除生硬边线/白边 */
      }
      #fp-root canvas {
        position: absolute;
        inset: 0;
        display: block;
      }
      .fp-num {
        font-family: 'Baloo 2', 'Noto Sans SC', sans-serif;
      }
      .fp-logo {
        font-family: 'ZCOOL KuaiLe', sans-serif;
      }
      /* 放大态：隐藏「世界锚定」的浮标（仓库/商店/基站牌）—— 菜单层不缩放，这些牌若留着会与放大后的画面错位 */
      body.fp-zoomed .fp-world {
        display: none !important;
      }
      /* H5 原型动画关键帧（HUD 脉冲 / Toast 上浮 / 机器人摇摆，与 FieldPlay.dc.html 对齐） */
      @keyframes fpGlow { 0%, 100% { opacity: 0.62; } 50% { opacity: 1; } }
      @keyframes fpRise { from { transform: translate(-50%, 8px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
      @keyframes fpRiseR { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @keyframes fpBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes fpSway { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
      @keyframes fpTwinkle { 0%, 100% { opacity: 0.78; } 50% { opacity: 1; } }
      @keyframes fpRotateNudge { 0%, 60%, 100% { transform: rotate(0deg); } 30% { transform: rotate(-82deg); } }

      /* 首屏加载提示 */
      #fp-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #eaf6e0;
        font-size: 16px;
        letter-spacing: 2px;
        z-index: 999;
        background: #0b1820;
      }
    </style>
  </head>
  <body>
    <div id="fp-boot">铁娃子果蔬园 · 加载中…</div>
    <div id="fp-wrap">
      <!-- 毛玻璃补全：把当前场景模糊放大铺满整屏当背景，清晰舞台叠在其上 → 黑边变成场景的模糊延续、自然渐隐、无硬切口（由 main.ts 节流截图刷新） -->
      <div id="fp-backdrop"></div>
      <div id="fp-root"></div>
    </div>
    <!-- 竖屏提示（非阻断）：手机竖屏时由 stage.ts fitBoard 显示，旋转到横屏自动消失 -->
    <div
      id="fp-rotate-hint"
      style="
        display: none;
        position: fixed;
        left: 50%;
        bottom: 10px;
        transform: translateX(-50%);
        z-index: 9998;
        align-items: center;
        gap: 7px;
        background: rgba(11, 24, 32, 0.86);
        color: #eaf6e0;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        padding: 8px 16px;
        border-radius: 22px;
        border: 1px solid rgba(176, 134, 63, 0.5);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
        pointer-events: none;
        white-space: nowrap;
      "
    >
      <span style="font-size: 18px; animation: fpRotateNudge 1.8s ease-in-out infinite; display: inline-block">🔄</span>
      旋转手机至横屏，体验更佳
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
